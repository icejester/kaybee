services:
  ollama:
    image: ollama/ollama:latest
    container_name: kaybee-ollama
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: kaybee-backend
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - MODEL=qwen2.5-coder:7b
    depends_on:
      - ollama
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: kaybee-frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  ollama_data:
