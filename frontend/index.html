<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaybee</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #7c6af7;
      --accent-dim: #5a4fcf;
      --text: #e2e4ef;
      --text-dim: #8b8fa8;
      --code-bg: #13151f;
      --green: #4ade80;
      --red: #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      font-size: 14px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    /* Entry selector dropdown */
    #entry-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      padding: 2px 8px;
      outline: none;
      max-width: 180px;
    }
    #entry-select:focus { border-color: var(--accent); }

    .verbosity-toggle {
      display: flex;
      align-items: center;
      gap: 0;
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .verbosity-toggle button {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      transition: background 0.15s, color 0.15s;
      text-transform: uppercase;
    }

    .verbosity-toggle button.active {
      background: var(--accent);
      color: #fff;
    }

    .verbosity-toggle button:not(.active):hover {
      background: var(--border);
      color: var(--text);
    }

    /* Settings gear button */
    #settings-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      padding: 4px 8px;
      transition: color 0.15s, border-color 0.15s;
    }
    #settings-btn:hover { color: var(--text); border-color: var(--accent); }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }
    #status-dot.online { background: var(--green); }
    #status-dot.error  { background: var(--red); }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      gap: 8px;
    }
    .empty-state .prompt-hint {
      font-size: 20px;
      color: var(--text-dim);
    }
    .empty-state p { font-size: 13px; }

    .message {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    .message .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }

    .message.user .label { color: var(--accent); }

    .message .body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      line-height: 1.65;
      word-break: break-word;
    }

    .message.user .body {
      background: var(--code-bg);
      border-color: var(--accent-dim);
      white-space: pre-wrap;
    }

    /* Markdown prose styles for assistant messages */
    .message.assistant .body p { margin: 0 0 10px; }
    .message.assistant .body p:last-child { margin-bottom: 0; }
    .message.assistant .body ul,
    .message.assistant .body ol { margin: 0 0 10px 20px; }
    .message.assistant .body li { margin-bottom: 4px; }
    .message.assistant .body h1,
    .message.assistant .body h2,
    .message.assistant .body h3 { margin: 14px 0 6px; font-size: 14px; }
    .message.assistant .body strong { color: var(--text); }

    .message .body code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0 4px;
      font-size: 13px;
    }

    .message .body pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .message .body pre code {
      background: none;
      border: none;
      padding: 0;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    footer {
      border-top: 1px solid var(--border);
      padding: 16px 24px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      max-width: 860px;
      margin: 0 auto;
    }

    #question {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 12px 16px;
      resize: none;
      outline: none;
      line-height: 1.5;
      min-height: 48px;
      max-height: 200px;
      transition: border-color 0.2s;
    }
    #question:focus { border-color: var(--accent); }
    #question::placeholder { color: var(--text-dim); }

    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 0 20px;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }
    #send-btn:hover { background: var(--accent-dim); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    #new-session-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 0 14px;
      white-space: nowrap;
      transition: border-color 0.2s, color 0.2s;
    }
    #new-session-btn:hover { border-color: var(--accent); color: var(--text); }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
      max-width: 860px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── Settings modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.hidden { display: none; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      width: 520px;
      max-width: 95vw;
      max-height: 85vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    .modal h2 {
      font-size: 15px;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .modal-section { display: flex; flex-direction: column; gap: 12px; }
    .modal-section h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }

    /* Entry list */
    .entry-list { display: flex; flex-direction: column; gap: 8px; }

    .entry-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
    }

    .entry-item .entry-info { flex: 1; }
    .entry-item .entry-label { font-size: 13px; }
    .entry-item .entry-meta {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .entry-item .key-badge {
      font-size: 10px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 5px;
      color: var(--green);
    }

    .btn-delete {
      background: none;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 12px;
      padding: 3px 8px;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-delete:hover { border-color: var(--red); color: var(--red); }

    /* Add entry form */
    .form-fields { display: flex; flex-direction: column; gap: 10px; }

    .form-row { display: flex; flex-direction: column; gap: 4px; }

    .form-row label {
      font-size: 11px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    .form-row input, .form-row select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      padding: 8px 12px;
      outline: none;
      width: 100%;
      transition: border-color 0.2s;
    }
    .form-row input:focus, .form-row select:focus { border-color: var(--accent); }
    .form-row select option { background: var(--surface); }

    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }

    .btn-primary {
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      padding: 7px 16px;
      transition: background 0.2s;
    }
    .btn-primary:hover { background: var(--accent-dim); }

    .btn-secondary {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-dim);
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      padding: 7px 16px;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-secondary:hover { border-color: var(--text-dim); color: var(--text); }

    .no-entries {
      color: var(--text-dim);
      font-size: 12px;
      text-align: center;
      padding: 12px 0;
    }
  </style>
</head>
<body>

<header>
  <h1>kaybee</h1>
  <select id="entry-select" title="Active model"></select>
  <div class="verbosity-toggle">
    <button id="btn-concise" class="active" title="Answer only, no explanation">concise</button>
    <button id="btn-verbose" title="Answer with explanation">verbose</button>
  </div>
  <button id="settings-btn" title="Manage models">⚙</button>
  <span id="status-dot" title="Backend status"></span>
</header>

<main id="chat">
  <div class="empty-state" id="empty-state">
    <span class="prompt-hint">$ _</span>
    <p>Ask anything. Nothing leaves your machine.</p>
  </div>
</main>

<footer>
  <div class="input-row">
    <textarea id="question" rows="1"></textarea>
    <button id="send-btn">Ask</button>
    <button id="new-session-btn" title="Clear history and start a new conversation">New Session</button>
  </div>
  <p class="hint">Enter to send &nbsp;·&nbsp; Shift+Enter for newline</p>
</footer>

<!-- Settings modal -->
<div class="modal-overlay hidden" id="settings-overlay">
  <div class="modal">
    <h2>⚙ Model Settings</h2>

    <div class="modal-section">
      <h3>Configured Models</h3>
      <div class="entry-list" id="entry-list">
        <p class="no-entries">Loading…</p>
      </div>
    </div>

    <div class="modal-section">
      <h3>Add Model</h3>
      <div class="form-fields" id="add-form">
        <div class="form-row">
          <label>Label</label>
          <input id="f-label" type="text" placeholder="My Claude Sonnet" />
        </div>
        <div class="form-row">
          <label>Provider</label>
          <select id="f-provider"></select>
        </div>
        <div id="f-dynamic-fields" class="form-fields"></div>
      </div>
      <div class="modal-actions" style="margin-top:4px">
        <button class="btn-primary" id="btn-add-entry">Add Model</button>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-secondary" id="btn-close-settings">Close</button>
    </div>
  </div>
</div>

<script>
  const API = '';
  const chat = document.getElementById('chat');
  const emptyState = document.getElementById('empty-state');
  const questionEl = document.getElementById('question');
  const sendBtn = document.getElementById('send-btn');
  const newSessionBtn = document.getElementById('new-session-btn');
  const statusDot = document.getElementById('status-dot');
  const btnConcise = document.getElementById('btn-concise');
  const btnVerbose = document.getElementById('btn-verbose');
  const entrySelect = document.getElementById('entry-select');
  const settingsBtn = document.getElementById('settings-btn');
  const settingsOverlay = document.getElementById('settings-overlay');
  const btnCloseSettings = document.getElementById('btn-close-settings');
  const entryListEl = document.getElementById('entry-list');
  const fProvider = document.getElementById('f-provider');
  const fDynamic = document.getElementById('f-dynamic-fields');
  const btnAddEntry = document.getElementById('btn-add-entry');

  // ── State ──────────────────────────────────────────────────────────────────
  let verbosityMode = localStorage.getItem('verbosity') || 'concise';
  let entries = [];
  let providers = [];

  // ── Session ID ─────────────────────────────────────────────────────────────
  // Stored in sessionStorage so it clears when the tab is closed.
  let sessionId = sessionStorage.getItem('kb_session_id') || null;

  // ── Placeholder rotation ───────────────────────────────────────────────────
  const PLACEHOLDERS = [
  // signals & process control
  "Was SIGTERM 15 or 9?",
  "Which kill signal can't be caught?",
  "What's the difference between SIGTERM and SIGKILL?",
  "How do I send a signal to a process group?",
  "What does SIGHUP actually do to a daemon?",
  "How do I trap a signal in a shell script?",
  "What's SIGPIPE and when does it fire?",

  // permissions & ownership
  "Is it -rf or -fr?",
  "Was that chmod +t or +s?",
  "SGID or SUID — I always mix those up.",
  "What's the sticky bit octal again?",
  "Was it 1755 or 1777?",
  "umask. What does umask do again.",
  "How do I find all SUID binaries on the system?",
  "What does chmod 4755 actually set?",
  "How do I change ownership recursively without following symlinks?",
  "What's the difference between ACLs and standard unix permissions?",

  // file descriptors & redirection
  "What does 2>&1 actually mean?",
  "How do I redirect stderr to a file and stdout to another?",
  "What's the difference between > and >>?",
  "How do I discard stderr but keep stdout?",
  "What does >&- do?",
  "How do I duplicate a file descriptor in bash?",
  "What's /proc/self/fd again?",

  // devices & special files
  "What's the diff between /dev/null and /dev/zero?",
  "What does dd if=/dev/zero do again?",
  "How do I zero a disk without dd?",
  "What's /dev/urandom vs /dev/random?",
  "How do I create a block device with dd?",
  "What are major and minor device numbers?",
  "How do I make a named pipe again?",

  // filesystems & disk
  "How do I hex dump a binary again?",
  "What's the difference between hard and soft links?",
  "How do I find open file handles for a process?",
  "How do I list open file handles?",
  "How do I check inode usage vs block usage?",
  "What's the difference between fsck and e2fsck?",
  "How do I mount an image file as a loopback?",
  "How do I find which process has a file open?",
  "What does lsof -i do again?",
  "How do I check filesystem type without mounting?",
  "What's the difference between sync and fsync?",

  // memory & kernel
  "How do I read /proc/meminfo again?",
  "What does /proc/sys/vm/swappiness do?",
  "How do I read a core dump?",
  "What's the difference between VSZ and RSS?",
  "How do I check kernel ring buffer without dmesg?",
  "What does vm.overcommit_memory do?",
  "How do I inspect a running kernel module?",
  "What's in /proc/interrupts?",

  // networking
  "What's the flag to show numeric ports in netstat?",
  "How do I check which process owns a port?",
  "What does ss -tulpn do again?",
  "How do I trace a route with ICMP vs UDP?",
  "What's the difference between a hub and a switch, at the packet level?",
  "How do I set a static ARP entry?",
  "What does ip route show table all do?",
  "How do I capture traffic on a specific port with tcpdump?",

  // debugging & tracing
  "Was it strace or ltrace?",
  "How do I attach strace to a running process?",
  "What flag shows syscall timing in strace?",
  "How do I use gdb to get a backtrace from a core?",
  "What does perf stat actually measure?",
  "How do I profile a process without stopping it?",
  "What's the difference between valgrind and asan?",

  // shell & scripting
  "What's the flag to follow symlinks in find?",
  "How do I detach from a screen session?",
  "What's the difference between $@ and $*?",
  "How do I get the exit code of the last command in a pipe?",
  "What does set -e actually do in a script?",
  "How do I do arithmetic in bash without bc?",
  "What's the syntax for a here-doc again?",
  "How do I iterate over lines in a file without a subshell?",
  "What does $! hold again?",
  "How do I background a process and keep it running after logout?",

  // archives & data
  "Was it tar -xzvf or -xjvf for bzip?",
  "How do I list contents of a tar without extracting?",
  "What's the rsync flag to delete files not in source?",
  "How do I diff two directories recursively?",
  "What does od -c do again?",
  "How do I base64 decode on the command line?",
];
  questionEl.placeholder = PLACEHOLDERS[Math.floor(Math.random() * PLACEHOLDERS.length)];

  // ── Verbosity ──────────────────────────────────────────────────────────────
  function setVerbosity(mode) {
    verbosityMode = mode;
    localStorage.setItem('verbosity', mode);
    btnConcise.classList.toggle('active', mode === 'concise');
    btnVerbose.classList.toggle('active', mode === 'verbose');
  }
  setVerbosity(verbosityMode);
  btnConcise.addEventListener('click', () => setVerbosity('concise'));
  btnVerbose.addEventListener('click', () => setVerbosity('verbose'));

  // ── Textarea ───────────────────────────────────────────────────────────────
  questionEl.addEventListener('input', () => {
    questionEl.style.height = 'auto';
    questionEl.style.height = Math.min(questionEl.scrollHeight, 200) + 'px';
  });
  questionEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
  });
  sendBtn.addEventListener('click', submit);

  // ── Health check ───────────────────────────────────────────────────────────
  async function checkHealth() {
    try {
      const res = await fetch(`${API}/health`);
      if (!res.ok) throw new Error();
      statusDot.className = 'online';
      statusDot.title = 'Backend connected';
    } catch {
      statusDot.className = 'error';
      statusDot.title = 'Cannot reach backend';
    }
  }
  checkHealth();

  // ── Entry selector ─────────────────────────────────────────────────────────
  async function loadEntries() {
    try {
      const res = await fetch(`${API}/entries`);
      entries = await res.json();
    } catch {
      entries = [];
    }
    renderEntrySelect();
    renderEntryList();
  }

  function renderEntrySelect() {
    const prev = entrySelect.value;
    entrySelect.innerHTML = '';
    if (entries.length === 0) {
      const opt = document.createElement('option');
      opt.textContent = 'no models configured';
      opt.disabled = true;
      entrySelect.appendChild(opt);
      return;
    }
    for (const e of entries) {
      const opt = document.createElement('option');
      opt.value = e.id;
      opt.textContent = e.label;
      entrySelect.appendChild(opt);
    }
    // Restore previous selection if still present
    if (prev && entries.find(e => e.id === prev)) {
      entrySelect.value = prev;
    }
  }

  function activeEntryId() {
    return entrySelect.value || null;
  }

  // ── Settings modal ─────────────────────────────────────────────────────────
  settingsBtn.addEventListener('click', openSettings);
  btnCloseSettings.addEventListener('click', closeSettings);
  settingsOverlay.addEventListener('click', (e) => {
    if (e.target === settingsOverlay) closeSettings();
  });

  async function openSettings() {
    settingsOverlay.classList.remove('hidden');
    await Promise.all([loadEntries(), loadProviders()]);
  }

  function closeSettings() {
    settingsOverlay.classList.add('hidden');
    // Refresh the header dropdown after any changes
    loadEntries();
  }

  async function loadProviders() {
    try {
      const res = await fetch(`${API}/providers`);
      providers = await res.json();
    } catch {
      providers = [];
    }
    renderProviderSelect();
  }

  function renderProviderSelect() {
    fProvider.innerHTML = '';
    for (const p of providers) {
      const opt = document.createElement('option');
      opt.value = p.type;
      opt.textContent = p.type;
      fProvider.appendChild(opt);
    }
    renderDynamicFields();
  }

  fProvider.addEventListener('change', renderDynamicFields);

  function renderDynamicFields() {
    const selected = providers.find(p => p.type === fProvider.value);
    fDynamic.innerHTML = '';
    if (!selected) return;
    for (const field of selected.required_fields) {
      const row = document.createElement('div');
      row.className = 'form-row';
      const label = document.createElement('label');
      label.textContent = field.replace(/_/g, ' ');
      const input = document.createElement('input');
      input.id = `f-field-${field}`;
      input.name = field;
      input.placeholder = field;
      const sensitive = ['api_key', 'secret', 'token'].includes(field);
      input.type = sensitive ? 'password' : 'text';
      row.appendChild(label);
      row.appendChild(input);
      fDynamic.appendChild(row);
    }
  }

  function renderEntryList() {
    entryListEl.innerHTML = '';
    if (entries.length === 0) {
      entryListEl.innerHTML = '<p class="no-entries">No models configured yet.</p>';
      return;
    }
    for (const e of entries) {
      const item = document.createElement('div');
      item.className = 'entry-item';
      const info = document.createElement('div');
      info.className = 'entry-info';
      const labelEl = document.createElement('div');
      labelEl.className = 'entry-label';
      labelEl.textContent = e.label;
      const meta = document.createElement('div');
      meta.className = 'entry-meta';
      const modelStr = e.config.model ? ` · ${e.config.model}` : '';
      meta.textContent = `${e.provider_type}${modelStr}`;
      if (e.has_key) {
        const badge = document.createElement('span');
        badge.className = 'key-badge';
        badge.textContent = 'key set';
        meta.appendChild(document.createTextNode(' '));
        meta.appendChild(badge);
      }
      info.appendChild(labelEl);
      info.appendChild(meta);

      const del = document.createElement('button');
      del.className = 'btn-delete';
      del.textContent = 'remove';
      del.addEventListener('click', () => deleteEntry(e.id));

      item.appendChild(info);
      item.appendChild(del);
      entryListEl.appendChild(item);
    }
  }

  async function deleteEntry(id) {
    await fetch(`${API}/entries/${id}`, { method: 'DELETE' });
    await loadEntries();
  }

  btnAddEntry.addEventListener('click', async () => {
    const label = document.getElementById('f-label').value.trim();
    const provider_type = fProvider.value;
    if (!label) { alert('Please enter a label.'); return; }
    if (!provider_type) { alert('Please select a provider.'); return; }

    btnAddEntry.disabled = true;
    btnAddEntry.textContent = 'Adding…';

    try {
      const selected = providers.find(p => p.type === provider_type);
      const config = {};
      for (const field of (selected?.required_fields ?? [])) {
        const el = document.getElementById(`f-field-${field}`);
        if (el) config[field] = el.value;
      }

      const res = await fetch(`${API}/entries`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ label, provider_type, config }),
      });

      if (res.ok) {
        document.getElementById('f-label').value = '';
        fDynamic.querySelectorAll('input').forEach(el => el.value = '');
        await loadEntries();
      } else {
        const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
        alert(`Failed to add model: ${err.detail}`);
      }
    } catch (err) {
      alert(`Error: ${err.message}`);
    } finally {
      btnAddEntry.disabled = false;
      btnAddEntry.textContent = 'Add Model';
    }
  });

  // ── Chat ───────────────────────────────────────────────────────────────────
  function appendMessage(role, text) {
    emptyState.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    msg.innerHTML = `
      <span class="label">${role === 'user' ? 'you' : 'kaybee'}</span>
      <div class="body"></div>
    `;
    msg.querySelector('.body').textContent = text;
    chat.appendChild(msg);
    return msg.querySelector('.body');
  }

  function appendStreamingMessage() {
    emptyState.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'message assistant';
    msg.innerHTML = `
      <span class="label">kaybee</span>
      <div class="body"><span class="cursor"></span></div>
    `;
    chat.appendChild(msg);
    const body = msg.querySelector('.body');
    const cursor = body.querySelector('.cursor');
    let raw = '';
    return {
      append(text) {
        raw += text;
        cursor.remove();
        body.insertBefore(document.createTextNode(text), null);
        body.appendChild(cursor);
        chat.scrollTop = chat.scrollHeight;
      },
      done() {
        cursor.remove();
        body.innerHTML = marked.parse(raw);
        chat.scrollTop = chat.scrollHeight;
      }
    };
  }

  async function submit() {
    const question = questionEl.value.trim();
    if (!question) return;

    const entry_id = activeEntryId();
    if (!entry_id) {
      alert('No model selected. Add one in settings (⚙).');
      return;
    }

    questionEl.value = '';
    questionEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', question);
    chat.scrollTop = chat.scrollHeight;

    const streaming = appendStreamingMessage();

    try {
      const res = await fetch(`${API}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, mode: verbosityMode, entry_id, session_id: sessionId }),
      });

      // Capture session ID from response header and persist it
      const newSid = res.headers.get('X-Session-Id');
      if (newSid) {
        sessionId = newSid;
        sessionStorage.setItem('kb_session_id', sessionId);
      }

      if (!res.ok) {
        streaming.done();
        appendMessage('assistant', `Error: ${res.status} ${res.statusText}`);
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.trim()) continue;
          try {
            const chunk = JSON.parse(line);
            if (chunk.error) {
              streaming.done();
              appendMessage('assistant', `Error: ${chunk.error}`);
              return;
            }
            if (chunk.response) streaming.append(chunk.response);
          } catch { /* malformed chunk, skip */ }
        }
      }

      if (buffer.trim()) {
        try {
          const chunk = JSON.parse(buffer);
          if (chunk.response) streaming.append(chunk.response);
        } catch { /* ignore */ }
      }

      streaming.done();
    } catch (err) {
      streaming.done();
      appendMessage('assistant', `Network error: ${err.message}`);
    } finally {
      sendBtn.disabled = false;
      questionEl.focus();
    }
  }

  // ── New Session ────────────────────────────────────────────────────────────
  newSessionBtn.addEventListener('click', async () => {
    if (sessionId) {
      await fetch(`${API}/session/${sessionId}`, { method: 'DELETE' }).catch(() => {});
    }
    sessionStorage.removeItem('kb_session_id');
    sessionId = null;
    // Clear the chat log and show empty state
    while (chat.firstChild) chat.removeChild(chat.firstChild);
    chat.appendChild(emptyState);
    emptyState.style.display = '';
    questionEl.placeholder = PLACEHOLDERS[Math.floor(Math.random() * PLACEHOLDERS.length)];
    questionEl.focus();
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  loadEntries();
</script>
</body>
</html>
