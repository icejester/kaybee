<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kaybee</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #7c6af7;
      --accent-dim: #5a4fcf;
      --text: #e2e4ef;
      --text-dim: #8b8fa8;
      --code-bg: #13151f;
      --green: #4ade80;
      --red: #f87171;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', monospace;
      font-size: 14px;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--accent);
    }

    header .model-badge {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
    }

    .verbosity-toggle {
      display: flex;
      align-items: center;
      gap: 0;
      margin-left: auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }

    .verbosity-toggle button {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      transition: background 0.15s, color 0.15s;
      text-transform: uppercase;
    }

    .verbosity-toggle button.active {
      background: var(--accent);
      color: #fff;
    }

    .verbosity-toggle button:not(.active):hover {
      background: var(--border);
      color: var(--text);
    }

    #status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      transition: background 0.3s;
    }
    #status-dot.online { background: var(--green); }
    #status-dot.error  { background: var(--red); }

    main {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--text-dim);
      gap: 8px;
    }
    .empty-state .prompt-hint {
      font-size: 20px;
      color: var(--text-dim);
    }
    .empty-state p {
      font-size: 13px;
    }

    .message {
      display: flex;
      flex-direction: column;
      gap: 6px;
      max-width: 860px;
      width: 100%;
      margin: 0 auto;
    }

    .message .label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
    }

    .message.user .label { color: var(--accent); }

    .message .body {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 18px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user .body {
      background: var(--code-bg);
      border-color: var(--accent-dim);
    }

    /* code blocks inside responses */
    .message .body code {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0 4px;
      font-size: 13px;
    }

    .message .body pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .message .body pre code {
      background: none;
      border: none;
      padding: 0;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--accent);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    footer {
      border-top: 1px solid var(--border);
      padding: 16px 24px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      max-width: 860px;
      margin: 0 auto;
    }

    #question {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 12px 16px;
      resize: none;
      outline: none;
      line-height: 1.5;
      min-height: 48px;
      max-height: 200px;
      transition: border-color 0.2s;
    }
    #question:focus { border-color: var(--accent); }
    #question::placeholder { color: var(--text-dim); }

    #send-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      padding: 0 20px;
      transition: background 0.2s, opacity 0.2s;
      white-space: nowrap;
    }
    #send-btn:hover { background: var(--accent-dim); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
      max-width: 860px;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>

<header>
  <h1>kaybee</h1>
  <span class="model-badge" id="model-label">loading...</span>
  <div class="verbosity-toggle">
    <button id="btn-concise" class="active" title="Answer only, no explanation">concise</button>
    <button id="btn-verbose" title="Answer with explanation">verbose</button>
  </div>
  <span id="status-dot" title="Ollama status"></span>
</header>

<main id="chat">
  <div class="empty-state" id="empty-state">
    <span class="prompt-hint">$ _</span>
    <p>Ask anything. Nothing leaves your machine.</p>
  </div>
</main>

<footer>
  <div class="input-row">
    <textarea id="question" placeholder='how do I traverse a CSV file in bash again?' rows="1"></textarea>
    <button id="send-btn">Ask</button>
  </div>
  <p class="hint">Enter to send &nbsp;·&nbsp; Shift+Enter for newline</p>
</footer>

<script>
  const API = '';  // same origin via nginx proxy
  const chat = document.getElementById('chat');
  const emptyState = document.getElementById('empty-state');
  const questionEl = document.getElementById('question');
  const sendBtn = document.getElementById('send-btn');
  const modelLabel = document.getElementById('model-label');
  const statusDot = document.getElementById('status-dot');
  const btnConcise = document.getElementById('btn-concise');
  const btnVerbose = document.getElementById('btn-verbose');

  let verbosityMode = localStorage.getItem('verbosity') || 'concise';

  function setVerbosity(mode) {
    verbosityMode = mode;
    localStorage.setItem('verbosity', mode);
    btnConcise.classList.toggle('active', mode === 'concise');
    btnVerbose.classList.toggle('active', mode === 'verbose');
  }

  setVerbosity(verbosityMode);
  btnConcise.addEventListener('click', () => setVerbosity('concise'));
  btnVerbose.addEventListener('click', () => setVerbosity('verbose'));

  // auto-resize textarea
  questionEl.addEventListener('input', () => {
    questionEl.style.height = 'auto';
    questionEl.style.height = Math.min(questionEl.scrollHeight, 200) + 'px';
  });

  questionEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      submit();
    }
  });

  sendBtn.addEventListener('click', submit);

  async function checkHealth() {
    try {
      const res = await fetch(`${API}/health`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      statusDot.className = 'online';
      modelLabel.textContent = data.model;
      statusDot.title = 'Ollama connected';
    } catch {
      statusDot.className = 'error';
      modelLabel.textContent = 'offline';
      statusDot.title = 'Cannot reach backend';
    }
  }

  checkHealth();

  function appendMessage(role, text) {
    emptyState.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = `message ${role}`;
    msg.innerHTML = `
      <span class="label">${role === 'user' ? 'you' : 'kaybee'}</span>
      <div class="body"></div>
    `;
    msg.querySelector('.body').textContent = text;
    chat.appendChild(msg);
    return msg.querySelector('.body');
  }

  function appendStreamingMessage() {
    emptyState.style.display = 'none';
    const msg = document.createElement('div');
    msg.className = 'message assistant';
    msg.innerHTML = `
      <span class="label">kaybee</span>
      <div class="body"><span class="cursor"></span></div>
    `;
    chat.appendChild(msg);
    const body = msg.querySelector('.body');
    const cursor = body.querySelector('.cursor');
    return {
      append(text) {
        cursor.remove();
        // insert text node before re-appending cursor
        body.insertBefore(document.createTextNode(text), null);
        body.appendChild(cursor);
        chat.scrollTop = chat.scrollHeight;
      },
      done() {
        cursor.remove();
      }
    };
  }

  async function submit() {
    const question = questionEl.value.trim();
    if (!question) return;

    questionEl.value = '';
    questionEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', question);
    chat.scrollTop = chat.scrollHeight;

    const streaming = appendStreamingMessage();

    try {
      const res = await fetch(`${API}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, mode: verbosityMode }),
      });

      if (!res.ok) {
        streaming.done();
        appendMessage('assistant', `Error: ${res.status} ${res.statusText}`);
        return;
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.trim()) continue;
          try {
            const chunk = JSON.parse(line);
            if (chunk.error) {
              streaming.done();
              appendMessage('assistant', `Error: ${chunk.error}`);
              return;
            }
            if (chunk.response) {
              streaming.append(chunk.response);
            }
          } catch {
            // malformed chunk, skip
          }
        }
      }

      // flush remaining buffer
      if (buffer.trim()) {
        try {
          const chunk = JSON.parse(buffer);
          if (chunk.response) streaming.append(chunk.response);
        } catch { /* ignore */ }
      }

      streaming.done();
    } catch (err) {
      streaming.done();
      appendMessage('assistant', `Network error: ${err.message}`);
    } finally {
      sendBtn.disabled = false;
      questionEl.focus();
    }
  }
</script>
</body>
</html>
