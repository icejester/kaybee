server {
    listen 80;

    # API routes — all proxied to backend
    location ^~ /ask {
        proxy_pass http://backend:8000/ask;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    location ^~ /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }

    location ^~ /providers {
        proxy_pass http://backend:8000/providers;
        proxy_set_header Host $host;
    }

    location ^~ /entries {
        proxy_pass http://backend:8000/entries;
        proxy_set_header Host $host;
    }

    # Static frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }
}
